# CI — 让 README 的 Build 徽章名副其实。
# push 到 main 与 PR 时运行：Python 全套测试 + 前端 lint/build。

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # IPS PDF tests render CJK text — without a CJK-capable font fpdf2
      # raises on non-latin-1 characters. Mirror api/Dockerfile: WenQuanYi
      # Micro Hei linked into the path _find_cjk_font probes.
      - name: Install CJK font for PDF tests
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-wqy-microhei
          sudo mkdir -p /usr/share/fonts/truetype/noto
          sudo ln -sf /usr/share/fonts/truetype/wqy/wqy-microhei.ttc \
            /usr/share/fonts/truetype/noto/NotoSansCJK-Regular.ttc

      - name: Run test suite
        run: python -m pytest -q

  web:
    name: Web (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
